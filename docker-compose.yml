version: "3.8"

services:
  frontend:
    build:
      context: ./app/client
    expose:
      - "80"
    restart: always
    depends_on:
      - backend
    networks:
      - nabco-network

  backend:
    build:
      context: ./app/server
    env_file:
      - ./app/server/.env
    expose:
      - "8000"
    restart: always
    networks:
      - nabco-network

  nginx:
    image: nginx:latest
    container_name: nabco-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - /etc/letsencrypt:/etc/letsencrypt
    restart: always
    depends_on:
      - frontend
      - backend
    networks:
      - nabco-network

networks:
  nabco-network:
    external: true







